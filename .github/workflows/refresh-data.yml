name: Refresh grid data

on:
  schedule:
    # 1st of each month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pipeline tests
        working-directory: pipeline
        run: uv run pytest

      - name: Refresh data
        working-directory: pipeline
        run: uv run python -m pipeline.refresh

      - name: Show diff summary
        run: |
          echo "Changed files:"
          git status --short docs/data/  # INTHA EDATHULA MAATHIYACHU

      - name: Commit refreshed data
        run: |
          git config user.name "opengridin-bot"  # BOT PERU MAATHIYACHU
          git config user.email "opengridin-bot@users.noreply.github.com"

          if git diff --quiet docs/data/; then  # INTHA EDATHULA MAATHIYACHU
            echo "No data changes to commit."
            exit 0
          fi

          git add docs/data/  # INTHA EDATHULA MAATHIYACHU
          git commit -m "data: monthly refresh $(date -u +%Y-%m-%d)"
          git push
