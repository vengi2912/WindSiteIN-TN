<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Interactive map of every 66 / 132 / 220 / 500 / 765 kV and ±660 kV HVDC transmission line in India. Open data from OpenStreetMap and PyPSA-Earth."
    />
    <title>OpenGridIN — India's transmission grid, on one map</title>

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-name">OpenGridIN</span>
        <span class="brand-tag">India's transmission grid, on one map.</span>
      </div>
      <div class="brand-by" aria-label="author">by Blue Power Partners </div>
      <button id="legend-toggle" class="icon-btn" aria-label="Toggle legend" title="Toggle legend">
        ☰
      </button>
    </header>

    <main id="map" aria-label="India transmission grid map"></main>
    <div id="ui-container">
      
      <div class="map-ui-box">
        <div class="ui-title">Basemap</div>
        <label><input type="radio" name="basemap" value="positron" checked> Light Map</label>
        <label><input type="radio" name="basemap" value="satellite"> Google Satellite</label>
      </div>

      <div class="map-ui-box">
        <div class="ui-title">Filter Features</div>
        <select id="filter-field" class="ui-input">
          <option value="operator">Operator (Company)</option>
          <option value="name">Line / Plant Name</option>
          <option value="voltage">Voltage</option>
        </select>
        <input type="text" id="filter-value" class="ui-input" placeholder="Type exact value..." />
        <div class="ui-buttons">
          <button id="apply-filter" class="btn-primary">Apply</button>
          <button id="clear-filter" class="btn-secondary">Clear</button>
      </div>

    </div>
    <aside id="legend" class="legend" aria-label="Legend and layer controls">
      <h2>Voltage</h2>

    <aside id="legend" class="legend" aria-label="Legend and layer controls">
      <h2>Voltage</h2>
      <ul id="voltage-list" class="layer-list">
        <!-- populated by app.js from data/reference/voltage_classes.json -->
      </ul>

      <h2>Other layers</h2>
      <ul class="layer-list">
        <li>
          <label>
            <input type="checkbox" data-layer="substations" checked />
            <span class="swatch swatch--substation"></span>
            Substations
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" data-layer="generation" checked />
            <span class="swatch swatch--generation"></span>
            Generation plants
          </label>
        </li>
      </ul>

      <p class="meta-line" id="meta-line">Loading…</p>
    </aside>

    <footer class="attrib">
      ©
      <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener"
        >OpenStreetMap contributors</a
      >
      (ODbL) ·
      <a href="https://pypsa-earth.readthedocs.io/" target="_blank" rel="noopener"
        >PyPSA-Earth</a
      >
      (MIT) ·
      <a href="https://github.com/" target="_blank" rel="noopener">Source</a>
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
